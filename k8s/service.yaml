apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: production
  labels:
    app: backend
spec:
  type: NodePort          # NodePort pour accéder depuis l'extérieur sur Minikube
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001       # Port accessible via minikube ip:30001
    protocol: TCP
    name: http
  selector:
    app: backend