  DATABASE_PASSWORD: "postgres"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  JWT_REFRESH_SECRET: "CHANGE_ME_IN_PRODUCTION"
  GMAIL_USER: "your-email@gmail.com"
  GMAIL_PASSWORD: "your-app-password"
  GEMINI_API_KEY: "your-gemini-api-key"